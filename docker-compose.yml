services:

  # ─── PHP + Apache Web Server ───────────────────────────────────────────────
  web:
    image: php:8.1-apache
    container_name: car_assistant_web
    ports:
      - "8080:80"
    volumes:
      - ./web:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=car_assistant
    # Install the mysqli PHP extension (not included in base image)
    command: >
      bash -c "docker-php-ext-install mysqli && apache2-foreground"

  # ─── MySQL Database ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: car_assistant_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: car_assistant
    ports:
      - "3307:3306"
    volumes:
      - ./database/car_assistant.sql:/docker-entrypoint-initdb.d/car_assistant.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 10s
      retries: 10

  # ─── phpMyAdmin (bonus: DB admin UI) ────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: car_assistant_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - db

volumes:
  db_data:
